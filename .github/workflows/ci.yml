name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Lint with ruff
        run: python3 -m ruff check src/ tests/
      - name: Check formatting
        run: python3 -m ruff format --check src/ tests/

  test:
    runs-on: [self-hosted, Linux]
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install package
        run: pip install --user -e ".[test]"
      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

  build:
    runs-on: [self-hosted, Linux]
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install build tools
        run: pip install --user build 2>/dev/null || pip install --user --break-system-packages build
      - name: Build wheel and sdist
        run: python3 -m build --outdir dist/
      - name: Verify wheel contents
        run: |
          WHEEL=$(ls dist/*.whl)
          echo "Built: $WHEEL ($(stat -c%s "$WHEEL") bytes)"
          python3 -c "
          import zipfile, sys
          with zipfile.ZipFile('$WHEEL') as zf:
              names = zf.namelist()
              required = ['project_forge/models.py', 'project_forge/web/', 'templates/', 'static/']
              for r in required:
                  if not any(r in n for n in names):
                      print(f'MISSING: {r}')
                      sys.exit(1)
                  print(f'FOUND: {r}')
          print(f'Wheel contains {len(names)} files')
          "
      - name: Test install in venv
        run: |
          python3 -m venv /tmp/forge-test-venv
          /tmp/forge-test-venv/bin/pip install dist/*.whl
          /tmp/forge-test-venv/bin/python -c "import project_forge; print('OK:', project_forge.__file__)"
          test -f /tmp/forge-test-venv/bin/forge-generate || { echo "FAIL: forge-generate not found"; exit 1; }
          test -f /tmp/forge-test-venv/bin/forge-serve || { echo "FAIL: forge-serve not found"; exit 1; }
          echo "PASS: All entry points installed"
          rm -rf /tmp/forge-test-venv

  security:
    runs-on: [self-hosted, Linux]
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Security lint
        run: python3 -m ruff check src/ --select S --ignore S101,S311,S314,S603,S607,S701

  issue-test-ratio:
    runs-on: [self-hosted, Linux]
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check issue-to-test ratio
        env:
          GH_REPO: rayketcham-lab/project-forge
        run: |
          ISSUE_COUNT=$(gh issue list -R "$GH_REPO" --state all --label feature --json number -q 'length' 2>/dev/null || echo 0)
          TEST_COUNT=$(python3 -m pytest tests/ --collect-only -q 2>/dev/null | tail -1 | grep -oP '\d+(?= test)' || echo 0)
          echo "Feature issues: $ISSUE_COUNT, Tests: $TEST_COUNT"
          if [ "$TEST_COUNT" -lt "$ISSUE_COUNT" ]; then
            echo "::warning::Test count ($TEST_COUNT) is below feature issue count ($ISSUE_COUNT)"
          fi
