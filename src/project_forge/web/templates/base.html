<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Forge{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <span class="brand-icon">&#9881;</span> Project Forge
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/explore" class="nav-link {% if request.url.path == '/explore' or request.url.path == '/ideas' %}active{% endif %}">Explore</a>
                <a href="/projects" class="nav-link {% if request.url.path == '/projects' %}active{% endif %}">Projects</a>
                <a href="/docs" class="nav-link">API</a>
            </div>
            <div class="nav-search">
                <form action="/explore" method="get">
                    <input type="text" name="q" placeholder="Search ideas..." value="{{ search_query|default('') }}" class="search-input">
                </form>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="container">
            <p>Project Forge v0.2.0 &mdash; Autonomous IT Think-Tank Engine</p>
            <p class="footer-links">
                <a href="https://github.com/rayketcham/project-forge" target="_blank">GitHub</a>
                <span>&middot;</span>
                <a href="/health">Health</a>
                <span>&middot;</span>
                <a href="/docs">API Docs</a>
            </p>
        </div>
    </footer>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
